<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#022c22">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gestión de territorios - JW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">

    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Leaflet Maps CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Icons: FontAwesome (MANDATORY FIX) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS Assets (Processed by Vite) -->
    <link rel="stylesheet" href="/src/input.css">

    <!-- Emergency Power-Up: Hard Sync & Forced Cache Eviction -->
    <script>
        (function () {
            const CURRENT_BUILD = "4.8.5";
            window.CURRENT_BUILD = CURRENT_BUILD;
            console.log("🚀 XOLVY CORE v4.8.5: System Boot [FORCE_CACHE_PURGE]");
            
            // --- Force Cache Eviction on Version Jump ---
            try {
                const storedVersion = localStorage.getItem('xolvy_boot_version');
                if (storedVersion !== CURRENT_BUILD) {
                    console.warn(`🔥 Version transition (${storedVersion} -> ${CURRENT_BUILD}). Purging browser cache & SW...`);
                    if ('caches' in window) {
                        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
                    }
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
                    }
                    localStorage.setItem('xolvy_boot_version', CURRENT_BUILD);
                    localStorage.setItem('last_force_sync', Date.now().toString());
                }
            } catch (_e) {}

            // --- Xolvy Theme Engine 2.0 (FOUC Prevention) ---
            const theme = localStorage.getItem('theme') || 'auto';
            if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <!-- Early PWA Catch -->
    <script>
        window.deferredPWAPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPWAPrompt = e;
            console.log("📲 PWA: Install Opportunity Detected");
            window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body
    class="h-full font-['Outfit',sans-serif] antialiased selection:bg-teal-500/30 selection:text-teal-900 overflow-x-hidden w-full max-w-[100vw] transition-colors duration-700 ease-in-out bg-gradient-to-br from-slate-50 via-slate-100 to-white dark:bg-gradient-to-br dark:from-[#02040f] dark:via-[#050819] dark:to-[#02020a] text-slate-900 dark:text-slate-100">
    <div class="bg-accents">
        <div class="accent-blob bg-indigo-500/20 dark:bg-indigo-600/30 top-[-20%] left-[-10%] animation-delay-0"></div>
        <div class="accent-blob bg-teal-500/20 dark:bg-teal-600/20 bottom-[-20%] right-[-10%] animation-delay-2000">
        </div>
        <div class="accent-blob bg-purple-500/10 dark:bg-purple-600/20 top-[30%] right-[10%] animation-delay-4000">
        </div>
        <div class="accent-blob bg-blue-500/10 dark:bg-blue-600/10 bottom-[20%] left-[20%] animation-delay-6000"></div>
    </div>

    <!-- Xolvy Universal Loader 2.0 (Pantalla Única Nivel Dios - Theme Adaptive) -->
    <div id="xolvy-universal-loader" class="fixed inset-0 z-[999999] flex flex-col items-center justify-center bg-white/95 dark:bg-[#02040f]/95 backdrop-blur-2xl transition-opacity duration-500 ease-out select-none">
        <div class="absolute w-[400px] h-[400px] bg-indigo-500/10 dark:bg-indigo-600/20 rounded-full blur-[120px] animate-pulse"></div>
        <div class="absolute w-[400px] h-[400px] bg-emerald-500/10 dark:bg-emerald-600/20 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

        <div class="relative z-10 flex flex-col items-center gap-6 text-center max-w-xs px-6">
            <div class="relative w-24 h-24 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border-4 border-indigo-500/20 dark:border-indigo-400/20"></div>
                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-indigo-600 dark:border-t-indigo-400 animate-spin" style="animation-duration: 1.2s;"></div>
                <div class="absolute inset-2 rounded-full border-4 border-transparent border-t-emerald-600 dark:border-t-emerald-400 animate-spin" style="animation-duration: 2s; animation-direction: reverse;"></div>
                
                <div class="w-12 h-12 bg-gradient-to-br from-indigo-600 to-emerald-500 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-500/30 border border-white/40 dark:border-white/20 animate-pulse">
                    <i class="fas fa-layer-group text-white text-lg"></i>
                </div>
            </div>

            <div class="space-y-2">
                <h3 class="text-base font-black text-slate-900 dark:text-white uppercase tracking-widest drop-shadow-sm">Xolvy Territory System</h3>
                <p id="xolvy-loader-message" class="text-xs font-extrabold text-indigo-600 dark:text-amber-400 uppercase tracking-widest animate-pulse drop-shadow-sm">Cargando Xolvy Core...</p>
            </div>
        </div>
    </div>

    <script>
        window.showUniversalLoader = function(msg) {
            var loader = document.getElementById("xolvy-universal-loader");
            if (!loader) return;
            var msgEl = document.getElementById("xolvy-loader-message");
            if (msgEl && msg) msgEl.textContent = msg;
            loader.classList.remove("opacity-0", "pointer-events-none", "hidden");
            loader.classList.add("opacity-100");
        };

        window.hideUniversalLoader = function() {
            var loader = document.getElementById("xolvy-universal-loader");
            if (!loader) return;
            loader.classList.remove("opacity-100");
            loader.classList.add("opacity-0", "pointer-events-none");
            setTimeout(function() {
                if (loader.classList.contains("opacity-0")) {
                    loader.classList.add("hidden");
                }
            }, 500);
        };

        window.ocultarOverlay = window.hideUniversalLoader;
    </script>

    <main id="app-container" class="min-h-full w-full flex box-border">
        <!-- Application Root Shell -->
    </main>

    <!-- Google Maps API -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCftC0gCM1rVU08ATbJX982z0Cuz-s9E8o&libraries=geometry,drawing&loading=async"></script>

    <!-- Main Entry Point -->
    <script type="module" src="/app.js"></script>

    <style>
        .bg-accents {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .accent-blob {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.25;
            animation: drift 30s infinite alternate ease-in-out;
            will-change: transform;
            mix-blend-mode: screen;
        }

        @keyframes drift {
            from {
                transform: translate(-20%, -20%) rotate(0deg) scale(1);
            }

            to {
                transform: translate(20%, 20%) rotate(45deg) scale(1.1);
            }
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        .animation-delay-6000 {
            animation-delay: 6s;
        }

        .dark .accent-blob {
            opacity: 0.15;
            filter: blur(180px);
        }
    </style>
</body>

</html>
