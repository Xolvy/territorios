<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gestión de territorios - JW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">

    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- CSS Assets (Processed by Vite) -->
    <link rel="stylesheet" href="/src/input.css">

    <!-- Emergency Power-Up: Hard Sync if stuck -->
    <script>
        (function () {
            const CURRENT_BUILD = "2.4.0.9";
            const lastForce = localStorage.getItem('last_force_sync');
            const now = Date.now();

            // If the user is on v2.4.0.7 (legacy) we need to help them
            // This is a safety net for anyone who missed the update or has corrupted DB
            if (!lastForce || (now - parseInt(lastForce)) > 1000 * 60 * 60 * 24) {
                localStorage.setItem('last_force_sync', now.toString());
            }

            window.repairSystem = async function () {
                console.warn("🚨 Emergency Repair Triggered");
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let r of regs) await r.unregister();
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(k => caches.delete(k)));
                }
                localStorage.clear();
                sessionStorage.clear();
                try {
                    window.indexedDB.deleteDatabase("firestore/[DEFAULT]/territorios-jw/main");
                } catch (e) { }
                window.location.href = window.location.pathname + '?repair=done&v=' + Date.now();
            };

            // Detect corruption loop from console
            const originalError = console.error;
            console.error = function (...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('IndexedDB') && args[0].includes('corruption')) {
                    originalError.apply(console, ["🚀 Auto-repairing corrupted DB..."]);
                    window.indexedDB.deleteDatabase("firestore/[DEFAULT]/territorios-jw/main");
                    setTimeout(() => location.reload(), 1000);
                }
                originalError.apply(console, args);
            };
        })();
    </script>

    <!-- Early PWA Catch -->
    <script>
        window.deferredPWAPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPWAPrompt = e;
            console.log("📲 PWA: Install Opportunity Detected");
            window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
        });
    </script>
</head>

<body
    class="h-full font-['Outfit',sans-serif] antialiased selection:bg-teal-500/30 selection:text-teal-900 overflow-x-hidden">
    <div class="bg-accents">
        <div class="accent-blob bg-indigo-500/20 top-[-10%] left-[-10%] animation-delay-0"></div>
        <div class="accent-blob bg-teal-500/10 bottom-[-10%] right-[-10%] animation-delay-2000"></div>
        <div class="accent-blob bg-purple-500/10 top-[40%] right-[20%] animation-delay-4000"></div>
    </div>

    <main id="app-container" class="min-h-full">
        <!-- Application Root -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        </div>
    </main>

    <!-- Main Entry Point -->
    <script type="module" src="/app.js"></script>

    <style>
        .bg-accents {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .accent-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from {
                transform: translate(-15%, -15%) rotate(0deg);
            }

            to {
                transform: translate(15%, 15%) rotate(30deg);
            }
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        .dark .accent-blob {
            opacity: 0.1;
        }
    </style>
</body>

</html>
