<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gestión de territorios - JW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/styles.css?v=2.1.5">
    <!-- Ultra Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Leaflet Infrastructure -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Font Awesome 6.x Premium Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- PDF & Canvas Exports (S-13) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- Early PWA Catch -->
    <script>
        window.deferredPWAPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPWAPrompt = e;
            console.log("📲 PWA: Install Opportunity Detected (Global catch)");
            // Dispatch custom event for modules to react
            window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
        });
    </script>
</head>

<body
    class="h-full font-['Outfit',sans-serif] antialiased selection:bg-teal-500/30 selection:text-teal-900 overflow-x-hidden">
    <div class="bg-accents">
        <div class="accent-blob bg-indigo-500/20 top-[-10%] left-[-10%] animation-delay-0"></div>
        <div class="accent-blob bg-teal-500/10 bottom-[-10%] right-[-10%] animation-delay-2000"></div>
        <div class="accent-blob bg-purple-500/10 top-[40%] right-[20%] animation-delay-4000"></div>
    </div>
    <main id="app-container" class="min-h-full">
        <!-- Dynamic Content -->
    </main>
    <script type="module" src="/app.js?v=2.1.5"></script>
    <style>
        .bg-accents {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .accent-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from {
                transform: translate(-15%, -15%) rotate(0deg);
            }

            to {
                transform: translate(15%, 15%) rotate(30deg);
            }
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        .dark .accent-blob {
            opacity: 0.1;
        }
    </style>
</body>

</html>
