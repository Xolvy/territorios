<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gestión de territorios - JW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">

    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Leaflet Maps CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- CSS Assets (Processed by Vite) -->
    <link rel="stylesheet" href="/src/input.css">

    <!-- Emergency Power-Up: Hard Sync if stuck -->
    <script>
        (function () {
            const CURRENT_BUILD = "2.7.0";
            
            // --- Xolvy Theme Engine 2.0 (FOUC Prevention) ---
            const theme = localStorage.getItem('theme') || 'auto';
            if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            try {
                const lastForce = localStorage.getItem('last_force_sync');
                const now = Date.now();

                if (!lastForce || (now - parseInt(lastForce)) > 1000 * 60 * 60 * 24) {
                    localStorage.setItem('last_force_sync', now.toString());
                }
            } catch (e) {
                console.warn("⚠️ Storage Access Denied at boot. Running in restricted mode.", e);
            }
        })();
    </script>

    <!-- Early PWA Catch -->
    <script>
        window.deferredPWAPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPWAPrompt = e;
            console.log("📲 PWA: Install Opportunity Detected");
            window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>

<body
    class="h-full font-['Outfit',sans-serif] antialiased selection:bg-teal-500/30 selection:text-teal-900 overflow-x-hidden transition-colors duration-300 ease-in-out">
    <div class="bg-accents">
        <div class="accent-blob bg-indigo-500/20 dark:bg-indigo-600/30 top-[-20%] left-[-10%] animation-delay-0"></div>
        <div class="accent-blob bg-teal-500/20 dark:bg-teal-600/20 bottom-[-20%] right-[-10%] animation-delay-2000">
        </div>
        <div class="accent-blob bg-purple-500/10 dark:bg-purple-600/20 top-[30%] right-[10%] animation-delay-4000">
        </div>
        <div class="accent-blob bg-blue-500/10 dark:bg-blue-600/10 bottom-[20%] left-[20%] animation-delay-6000"></div>
    </div>

    <main id="app-container" class="min-h-full">
        <!-- Application Root -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        </div>
    </main>

    <!-- Google Maps API -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCftC0gCM1rVU08ATbJX982z0Cuz-s9E8o&libraries=geometry,drawing&loading=async"></script>

    <!-- Main Entry Point -->
    <script type="module" src="/app.js"></script>

    <style>
        .bg-accents {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .accent-blob {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            animation: drift 30s infinite alternate ease-in-out;
            will-change: transform;
        }

        @keyframes drift {
            from {
                transform: translate(-20%, -20%) rotate(0deg) scale(1);
            }

            to {
                transform: translate(20%, 20%) rotate(45deg) scale(1.1);
            }
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        .animation-delay-6000 {
            animation-delay: 6s;
        }

        .dark .accent-blob {
            opacity: 0.15;
            filter: blur(180px);
        }
    </style>
</body>

</html>
