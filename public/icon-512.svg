<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background: Soft Pastel Teal Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Map Symbol -->
  <g transform="translate(86, 86) scale(0.66)" filter="url(#shadow)">
    <!-- Folded Map -->
    <path d="M48 96 L176 32 L304 96 L432 32 V384 L304 448 L176 384 L48 448 Z" 
          fill="white" stroke="#0f766e" stroke-width="24" stroke-linejoin="round"/>
    
    <!-- Folds -->
    <path d="M176 32 V384 M304 96 V448" 
          stroke="#0f766e" stroke-width="24" stroke-linecap="round"/>
          
    <!-- Elegant Pin (Teal with hole) -->
    <circle cx="240" cy="190" r="50" fill="#0d9488" stroke="white" stroke-width="8"/>
    <circle cx="240" cy="190" r="18" fill="white"/>
    <path d="M240 240 L240 320" stroke="#0d9488" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
