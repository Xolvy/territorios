    <style>
        /* Reset para evitar márgenes extraños en la captura */
        * { box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            width: 1220px; /* Ancho exacto A4 Horizontal */
            color: #000;
        }

        .table-container {
            width: 1220px;
            
            padding: 20px;
            background: white;
        }

        .main-title {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        table {
            width: 100%; /* Ocupa todo el contenedor de 1120px */
            border-collapse: collapse;
            table-layout: fixed; /* CRUCIAL: Fuerza el ancho de las columnas */
        }

        /* Definición de anchos de columnas para llenar los 1120px */
        .col-detalle { width: 110px; }
        .col-dia { width: 138px; } /* (1120 - 110 - 85 - márgenes) / 7 días */
        .col-grupos { width: 110px; padding-right: 15px; }

        th, td {
            /* height: 32px; */
            padding: 4px;
            vertical-align: middle;
            text-align: center;
            font-size: 13px;
            border: none;
            overflow: visible;
            word-wrap: break-word;
        }

        .h-cyan { 
            background-color: #B5E1DC; 
            font-family: "Arial Black", Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #fff; /* Separador sutil */
        }

        .col-detalle-label {
            font-family: "Arial Black", Arial, sans-serif;
            font-weight: 900;
            text-align: left;
            padding-left: 8px;
        }

        .bold { font-weight: bold; }

        /* Colores de bloques */
        .det-1 { background-color: #FFE599; } .dat-1 { background-color: #FFF2CC; }
        .det-2 { background-color: #F9CB9C; } .dat-2 { background-color: #FBE4CD; }
        .det-3 { background-color: #A4C2F4; } .dat-3 { background-color: #CFE2F3; }
        .det-4 { background-color: #B6D7A8; } .dat-4 { background-color: #D9EAD3; }
        
        .dat-grp { background-color: #FFF2CC; font-size: 16px; vertical-align: top; padding-top: 15px; }

        /* Triangulito verde */
        .note-tl { position: relative; }
        .note-tl::after { display: none !important; /* 
            content: ''; position: absolute; top: 0; left: 0; 
            border-top: 8px solid #2E7D32; border-right: 8px solid transparent; */ }

        .spacer td { height: 12px; background-color: #ffffff; }
    
        /* Ampliar el alto vertical de la fila FACETAS */
        tr:has(> td[id$="-faceta"]), [id$="-faceta"] {
            padding-top: 18px !important;
            padding-bottom: 18px !important;
        }
        
        /* Asegurarse que grupos alinee hacia arriba */
        .dat-grp {
            vertical-align: top !important;
            padding-top: 15px !important;
        }
    </style>
